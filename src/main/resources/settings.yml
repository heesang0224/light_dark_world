# ==========================
# Random Enchant Settings
# ==========================

# 최대 랜덤 인첸트 개수
max-enchants: 8

# 모든 아이템에 모든 바닐라 인첸트 허용
unsafe-enchant: true

# 인첸트 테이블 GUI 제목
gui-title: "랜덤 인첸트"

# 인첸트 비용
cost:
  levels: 30
  lapis: 4

# 인첸트 레벨 가중치
level-weight:
  1: 45
  2: 30
  3: 15
  4: 8
  5: 2

# 제외할 인첸트
blacklist:
  - minecraft:binding_curse
  - minecraft:vanishing_curse

# GUI 슬롯
slots:
  item: 22
  enchant: 31
  info: 15
  close: 49

sounds:
  success: ENTITY_PLAYER_LEVELUP
  fail: ENTITY_ITEM_BREAK
  click: UI_BUTTON_CLICK

particles:
  success: ENCHANT
  fail: SMOKE

messages:
  max: "&c이미 최대 인첸트입니다."
  success: "&a랜덤 인첸트 성공!"
  fail: "&c인첸트 실패!"

# ==========================
# 강화 시스템 설정
# ==========================

# 최대 강화 레벨
max-enhancement: 10

# 강화 비용 (XP 레벨, 2의 배수: 1강=2, 2강=4, 3강=6...)
enhancement-cost:
  1: 2
  2: 4
  3: 6
  4: 8
  5: 10
  6: 12
  7: 14
  8: 16
  9: 18
  10: 20

# 강화 성공 확률 (%)
# 레벨이 높아질수록 낮아집니다
enhancement-success-rate:
  1: 100
  2: 95
  3: 90
  4: 85
  5: 80
  6: 70
  7: 60
  8: 50
  9: 40
  10: 30

# 강화 파괴 확률 (%) - 5강부터 적용
# 강화 실패 시 아이템이 파괴될 확률
enhancement-break-rate:
  1: 0
  2: 0
  3: 0
  4: 0
  5: 5
  6: 15
  7: 30
  8: 50
  9: 75
  10: 99

# 강화 메시지
enhancement-messages:
  max: "&c이미 최대 강화입니다!"
  success: "&a강화 성공! ({level}강, -{xp}XP)"
  fail: "&c강화 실패!"
  destroyed: "&c강화 실패! 아이템이 파괴되었습니다!"
  insufficient-xp: "&cXP가 부족합니다. 필요: {required}레벨, 보유: {current}레벨"
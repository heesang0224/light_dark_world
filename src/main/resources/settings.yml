# ==========================
# 10강 전용 액티브 스킬 설정
# ==========================
enhancement-abilities:
  mace:
    cooldown-seconds: 1
  trident:
    burst-count: 15
    despawn-seconds: 3
    cooldown-seconds: 1.0
    damage-multiplier: 1.5
  fishing-rod:
    stun-seconds: 3
  boots:
    cooldown-seconds: 1
    speed-multiplier: 1.0
    y-boost: 0.3
    fall-damage-enabled: true
    # 이동속도(상대값). 0.05 = 기본 이동속도 대비 +5%
    speed: { 1: 0.05, 2: 0.10, 3: 0.15, 4: 0.20, 5: 0.25, 6: 0.30, 7: 0.35, 8: 0.40, 9: 0.45, 10: 0.50 }
